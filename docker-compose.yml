services:
  postgres:
    image: postgres:16-alpine
    container_name: repaire_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: repaire_dev
      POSTGRES_USER: repaire
      POSTGRES_PASSWORD: repaire_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repaire -d repaire_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
